version = 1

[queue_idle]
policy = "review_and_enqueue"
prompt_path = ".codex-exec-loop/planning/prompts/queue-idle-review.md"

[[directions]]
id = "data-trust-and-lineage"
title = "Data trust and lineage"
summary = "Harden the data plane so every run points to a stable dataset boundary, market-data freshness and failures are operator-visible, and crypto-first ingestion can expand without weakening provenance."
success_criteria = [
    "Runs carry stable dataset or sync-checkpoint identity strong enough to validate rerun boundaries.",
    "Market-data status exposes freshness, gap, and failure history in a way the operator can act on without shell access.",
    "Read-side market access and write-side synchronization stay separated behind ports and adapters.",
]
scope_hints = [
    "Use docs/blueprint/platform-program.md Workstream A, docs/blueprint/metrics-and-gates.md Metric Group A, and docs/blueprint/risk-register.md Risk 1 as the main guardrails.",
    "Prefer dataset identity, ingestion history, and data-quality visibility ahead of new venue breadth or market expansion polish.",
    "Keep Binance crypto as the operational baseline while preserving a clean extension path for stocks.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/data-trust-and-lineage.md"
state = "active"

[[directions]]
id = "llm-sensitivity-decomposition"
title = "LLM sensitivity decomposition"
summary = "Break giant compatibility files into bounded route, model, and serializer modules while keeping the existing product/API surface stable."
success_criteria = [
    "Compatibility barrels remain import-stable, but real ownership moves into bounded modules under frontend and backend feature/support paths.",
    "App.tsx, application.py, controlRoomApi.ts, controlRoomDefinitions.ts, and domain/models.py stop absorbing new feature logic and shrink through extraction milestones.",
    "Frontend route composition has smoke-test coverage so decomposition can continue without re-opening the whole control room by default.",
]
scope_hints = [
    "Treat this as a cross-cutting architecture lane that supports every product batch rather than as a one-off cleanup pass.",
    "Prefer compatibility re-exports and delegation shims over API/path/schema churn.",
    "Split by bounded flow first: provider provenance, query-builder replay governance, comparison serialization, and model families.",
]
detail_doc_path = ".codex-exec-loop/planning/directions/llm-sensitivity-decomposition.md"
state = "active"
