services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: akra
      POSTGRES_PASSWORD: akra
      POSTGRES_DB: akra_trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: >
      bash -lc "python -m venv .venv &&
      .venv/bin/python -m pip install -e '.[dev]' &&
      .venv/bin/uvicorn akra_trader.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    image: node:24
    working_dir: /workspace/apps/web
    command: >
      bash -lc "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - .:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
