services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: akra
      POSTGRES_PASSWORD: akra
      POSTGRES_DB: akra_trader
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akra -d akra_trader"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    environment:
      AKRA_TRADER_CORS_ORIGIN: http://localhost:47613
      AKRA_TRADER_RUNS_DATABASE_URL: postgresql+psycopg://akra:akra@postgres:5432/akra_trader
      AKRA_TRADER_MARKET_DATA_SYNC_TIMEFRAMES: 1m,5m,15m,1h
      AKRA_TRADER_PROVIDER_PROVENANCE_SCHEDULER_SEARCH_SERVICE_URL: memory://local
    command: >
      bash -lc "python -m venv .venv &&
      .venv/bin/python -m pip install -e '.[dev]' &&
      .venv/bin/uvicorn akra_trader.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/workspace
      - api_venv:/workspace/apps/api/.venv
    ports:
      - "47680:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:24
    working_dir: /workspace/apps/web
    command: >
      bash -lc "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:47680/api
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    ports:
      - "47613:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  api_venv:
  web_node_modules:
